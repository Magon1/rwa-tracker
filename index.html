<style>
  :root{ /* Editorial (default) */

    --serif:'Fraunces',Georgia,serif;
    --sans:'Inter',system-ui,sans-serif;

  }
  body.t-terminal{ /* Bloomberg dark · monospace · dense */
    --paper:#0a0a0a; --card:#121212; --card2:#171717; --ink:#e8e8e8; --ink2:#c2c2c2;
    --mut:#8a8a8a; --line:#222; --line2:#2e2e2e; --chart-grid:#1c1c1c;
    --up:#26d962; --down:#ff4d4d; --gold:#ffa028; --accent:#ffa028;
    --ondo:#a78bfa; --xs:#5b9bff; --bp:#e5383b;
    --mono:'JetBrains Mono',monospace; --serif:'JetBrains Mono',monospace; --sans:'IBM Plex Sans',sans-serif; --radius:2px;
  }
  body.t-nebula{ /* modern analytics dark · Dune/Nansen */
    --paper:#0e0f13; --card:#1a1b22; --card2:#20222b; --ink:#f4f5f7; --ink2:#cbd0db;
    --mut:#8b8f9c; --line:#262833; --line2:#333647; --chart-grid:#23252f;
    --up:#2dd4a7; --down:#ff5c72; --gold:#7c5cff; --accent:#7c5cff;
    --ondo:#a78bfa; --xs:#5b8cff; --bp:#e5383b;
    --mono:'IBM Plex Mono',monospace; --serif:'Space Grotesk',sans-serif; --sans:'Inter',sans-serif; --radius:12px;
  }
  body.t-institutional{ /* clean light · DefiLlama/Stripe/Token Terminal */
    --paper:#fbfbfd; --card:#ffffff; --card2:#f4f6f9; --ink:#0a2540; --ink2:#334155;
    --mut:#6b7280; --line:#e6e8ec; --line2:#d8dbe0; --chart-grid:#eef0f3;
    --up:#10a862; --down:#e5484d; --gold:#4f46e5; --accent:#4f46e5;
    --ondo:#6366f1; --xs:#2f6fed; --bp:#e5383b;
    --mono:'IBM Plex Mono',monospace; --serif:'Manrope',sans-serif; --sans:'Inter',sans-serif; --radius:8px;
  }
  body.t-vault{ /* warm gold private-bank dark */
    --paper:#0d0c0a; --card:#1a1815; --card2:#211e19; --ink:#f3efe7; --ink2:#d8d2c5;
    --mut:#9a9384; --line:#2b2823; --line2:#38332b; --chart-grid:#241f19;
    --up:#3fb97a; --down:#d9544d; --gold:#e5b94e; --accent:#e5b94e;
    --ondo:#b8a6f5; --xs:#6f93e6; --bp:#e5383b;
    --mono:'IBM Plex Mono',monospace; --serif:'Fraunces',serif; --sans:'Inter',sans-serif; --radius:7px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;

  .nav{position:sticky;top:0;z-index:30;background:var(--paper);border-bottom:1px solid var(--line2);
    display:flex;gap:4px;flex-wrap:wrap;padding:9px 0;margin-bottom:6px}
  .nav a{font-family:var(--mono);font-size:12px;color:var(--mut);padding:7px 13px;border-radius:var(--radius);
    border:1px solid transparent;cursor:pointer}
  .nav a:hover{color:var(--ink);background:var(--card);border-color:var(--line2)}
  .nav a.active{color:var(--paper);background:var(--ink);border-color:var(--ink)}
  .nav button.tab{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--mut);
    padding:9px 17px;border:1px solid transparent;border-radius:7px;background:none;cursor:pointer}
  .nav button.tab:hover{color:var(--ink);background:var(--card);border-color:var(--line2)}
  .nav button.tab.on{color:var(--paper);background:var(--ink);border-color:var(--ink)}
  section{scroll-margin-top:64px}
  a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line2)}
  a:hover{border-color:var(--ink)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px 40vh}
  .mast{padding:22px 0 14px;border-bottom:2px solid var(--ink)}
  .mast-top{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap}
  .title{font-family:var(--serif);font-weight:600;font-size:40px;letter-spacing:-.5px;line-height:.95}
  .title b{font-style:italic;font-weight:600}
  .mast-controls{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11px;color:var(--mut);border:1px solid var(--line2);
    padding:5px 9px;border-radius:3px;background:var(--card);display:inline-flex;align-items:center;gap:6px}
  .chip .led{width:6px;height:6px;border-radius:50%;background:var(--up)}
  .chip.closed .led{background:var(--mut)}
  .btn{font-family:var(--mono);font-size:11px;color:var(--ink);border:1px solid var(--line2);
    padding:6px 10px;border-radius:3px;background:var(--card);cursor:pointer}
  .btn:hover{border-color:var(--ink)}
  .edition{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11px;color:var(--mut);text-transform:uppercase;
    letter-spacing:.6px;padding:9px 0;border-bottom:1px solid var(--line);margin-bottom:22px}
  .searchbar{display:flex;align-items:center;gap:10px;margin:20px 0;padding:3px 4px 3px 14px;
    background:var(--card);border:1px solid var(--line2);border-radius:5px;max-width:560px}
  .searchbar svg{flex:none;opacity:.5}
  .searchbar input{flex:1;border:none;background:none;outline:none;font-family:var(--sans);
    font-size:15px;color:var(--ink);padding:9px 0}
  .searchbar .clr{font-family:var(--mono);font-size:11px;color:var(--mut);background:var(--card2);
    border:1px solid var(--line);padding:5px 9px;border-radius:3px;cursor:pointer}
  #searchInfo{font-family:var(--mono);font-size:12px;color:var(--mut);margin:-8px 0 18px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line2);
    border-radius:var(--radius);overflow:hidden;background:var(--card);margin-bottom:8px}
  .kpi{padding:15px 18px;border-right:1px solid var(--line)}
  .kpi:last-child{border-right:none}
  .kpi .l{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut)}
  .kpi .v{font-family:var(--serif);font-weight:600;font-size:27px;margin-top:8px;letter-spacing:-.3px}
  .kpi .s{font-size:12px;color:var(--mut);margin-top:3px}
  .up{color:var(--up)} .down{color:var(--down)}
  .hero{display:grid;grid-template-columns:1.45fr 1fr;gap:16px;margin:18px 0}
  .hero-card{background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);padding:20px 24px;position:relative;overflow:hidden}
  .hero-lead{border-left:4px solid var(--ink)}
  .hero-eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--mut)}
  .hero-title{font-family:var(--serif);font-size:30px;font-weight:700;margin:10px 0 3px;display:flex;align-items:baseline;gap:13px;flex-wrap:wrap}
  .hero-big{font-size:38px;letter-spacing:-1px}
  .hero-sub{font-size:13px;color:var(--ink2);margin-bottom:18px}
  .hero-cta{display:inline-flex;align-items:center;gap:8px;color:#fff;border:none;border-radius:8px;
    padding:12px 22px;font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .hero-cta:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .pulse-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;color:var(--mut)}
  .pulse-row b{font-family:var(--mono);color:var(--ink);font-size:14px}
  .pulse-live{margin-top:12px;font-family:var(--mono);font-size:11.5px;color:var(--up);display:flex;align-items:center;gap:7px}
  .pulse-live .dot{width:7px;height:7px;border-radius:50%;background:var(--up);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--up) 60%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .movers{display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:14px;margin:16px 0 6px}
  .mv-card{background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);padding:13px 16px}
  .mv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .mv-head h4{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin:0}
  .mv-row{display:flex;justify-content:space-between;align-items:baseline;padding:4.5px 0;font-size:13px}
  .mv-row .tk{font-size:13px} .mv-row .v{font-family:var(--mono);font-size:12.5px}
  .mv-link{font-family:var(--mono);font-size:10.5px;color:var(--accent);cursor:pointer;border:none;background:none}
  .mv-new{display:flex;align-items:baseline;gap:8px;padding:4.5px 0;font-size:12.5px}
  .mv-new .d{font-family:var(--mono);font-size:10.5px;color:var(--mut)}
  .star{cursor:pointer;color:var(--line2);font-size:13px;margin-right:5px;user-select:none;transition:color .12s}
  .star:hover{color:var(--gold)} .star.on{color:var(--gold)}
  .seg button.watch.on{background:var(--gold);color:#fff;border-color:var(--gold)}
  .btn.on{background:var(--gold);color:#fff;border-color:var(--gold)}
  @media(max-width:880px){.hero{grid-template-columns:1fr}.movers{grid-template-columns:1fr}}
  .callout{display:flex;gap:14px;background:var(--card);border:1px solid var(--line2);
    border-left:3px solid var(--bp);border-radius:5px;padding:14px 18px;margin:22px 0}
  .callout .q{font-family:var(--serif);font-weight:600;font-size:15px;white-space:nowrap;color:var(--bp)}
  .callout .a{font-size:13px;color:var(--ink2)}
  section{margin:38px 0}
  .sec-head{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;
    border-bottom:1px solid var(--ink);padding-bottom:8px;margin-bottom:16px}
  .sec-label{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--mut);text-transform:uppercase}
  .sec-head h2{font-family:var(--serif);font-weight:600;font-size:22px;margin:3px 0 0;letter-spacing:-.3px}
  .sec-head .desc{font-size:12.5px;color:var(--mut);max-width:48ch;text-align:right}
  .grid{display:grid;gap:22px}
  .g2{grid-template-columns:1.25fr .75fr}
  .gg2{grid-template-columns:1fr 1fr}
  .panel{background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);padding:18px}
  .panel h3{font-family:var(--serif);font-weight:600;font-size:16px;margin:0 0 2px}
  .panel .pd{font-size:12px;color:var(--mut);margin:0 0 14px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:right;padding:9px 9px;border-bottom:1px solid var(--line);font-size:13px}
  th:first-child,td:first-child{text-align:left}
  thead th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--mut);font-weight:500;border-bottom:1px solid var(--line2)}
  tbody tr:hover{background:var(--card2)}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .tk{font-family:var(--mono);font-weight:600;font-size:13.5px}
  td.c-tk{text-align:left}
  .logo{width:17px;height:17px;border-radius:3px;vertical-align:-4px;margin-right:7px;object-fit:contain;background:#fff;border:1px solid var(--line)}
  .nm{color:var(--mut);font-size:11.5px}
  .rk{font-family:var(--mono);color:var(--mut);width:24px;text-align:right}
  .pill{font-family:var(--mono);font-size:10.5px;font-weight:500;padding:2px 7px;border-radius:3px;border:1px solid}
  .pill.Backpack{color:var(--bp);border-color:color-mix(in srgb,var(--bp) 40%,transparent);background:color-mix(in srgb,var(--bp) 13%,transparent)}
  .pill.xStocks{color:var(--xs);border-color:color-mix(in srgb,var(--xs) 40%,transparent);background:color-mix(in srgb,var(--xs) 13%,transparent)}
  .pill.Ondo{color:var(--ondo);border-color:color-mix(in srgb,var(--ondo) 40%,transparent);background:color-mix(in srgb,var(--ondo) 13%,transparent)}
  .pill.Dinari{color:var(--dinari);border-color:color-mix(in srgb,var(--dinari) 40%,transparent);background:color-mix(in srgb,var(--dinari) 13%,transparent)}
  .tag{font-family:var(--mono);font-size:10px;color:var(--mut);border:1px solid var(--line2);padding:1px 5px;border-radius:3px}
  .vbar{position:relative}
  .vbar i{position:absolute;left:0;top:50%;transform:translateY(-50%);height:60%;border-radius:2px;opacity:.16;z-index:0}
  .vbar span{position:relative;z-index:1}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;margin-top:12px}
  .legend .sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:4px;overflow:hidden}
  .seg button{font-family:var(--mono);font-size:11px;background:var(--card);border:none;
    color:var(--mut);padding:6px 12px;cursor:pointer;border-left:1px solid var(--line)}
  .seg button:first-child{border-left:none}
  .seg button.on{background:var(--ink);color:var(--paper)}
  .cmp{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px}
  .ic{background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);padding:18px;border-top:3px solid}
  .ic h3{font-family:var(--serif);font-weight:600;font-size:18px;margin:0}
  .ic .cnt{font-family:var(--mono);font-size:12px;color:var(--mut)}
  .ic .tag2{font-size:11.5px;color:var(--mut);margin:8px 0 2px}
  .ic .por{font-family:var(--mono);font-size:10.5px;color:var(--up);margin-top:6px}
  .ic ul{margin:10px 0 0;padding:0;list-style:none;font-size:12px;line-height:1.5}
  .ic li{padding:6px 0;border-top:1px solid var(--line);color:var(--mut)}
  .ic li b{color:var(--ink);font-weight:600}
  .ic li:first-child{border-top:none}
  .listings{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .lst{font-family:var(--mono);font-size:11.5px;border:1px solid var(--line2);border-radius:4px;padding:7px 11px;background:var(--card)}
  .lst b{color:var(--ink)} .lst .d{color:var(--mut)}
  .news{display:grid;gap:0;border-top:1px solid var(--line2)}
  .ni{display:flex;gap:14px;padding:13px 2px;border-bottom:1px solid var(--line);align-items:baseline}
  .ni .cat{font-family:var(--mono);font-size:10px;letter-spacing:.5px;padding:2px 7px;border-radius:3px;white-space:nowrap;width:88px;text-align:center}
  .cat.reg{color:var(--down);background:color-mix(in srgb,var(--down) 14%,transparent)}
  .cat.entrant{color:var(--xs);background:color-mix(in srgb,var(--xs) 14%,transparent)}
  .cat.launch{color:var(--up);background:color-mix(in srgb,var(--up) 14%,transparent)}
  .cat.milestone{color:var(--gold);background:color-mix(in srgb,var(--gold) 16%,transparent)}
  .badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.4px}
  .badge.live{color:var(--up);background:color-mix(in srgb,var(--up) 16%,transparent)}
  .badge.sample{color:var(--gold);background:color-mix(in srgb,var(--gold) 18%,transparent)}
  .ni h4{margin:0;font-size:13.5px;font-weight:500}
  .ni .meta{font-family:var(--mono);font-size:11px;color:var(--mut);white-space:nowrap}
  .ni-item{border-bottom:1px solid var(--line)}
  .ni-item>.ni{border-bottom:none;cursor:pointer}
  .ni-item>.ni:hover h4{color:var(--accent)}
  .ni-caret{font-size:9px;color:var(--mut);transition:transform .15s}
  .ni.open .ni-caret{transform:rotate(180deg)}
  .ni-summary{padding:0 4px 14px 102px}
  .ni-summary p{margin:0 0 8px;font-size:12.5px;color:var(--ink2);line-height:1.55}
  .ni-summary a{font-family:var(--mono);font-size:11px;color:var(--accent)}
  .foot{margin-top:46px;border-top:2px solid var(--ink);padding-top:14px;font-family:var(--mono);font-size:11px;color:var(--mut);line-height:1.7}
  .ic{cursor:pointer;transition:box-shadow .15s,transform .15s}
  .ic:hover{box-shadow:0 6px 22px rgba(28,27,23,.12);transform:translateY(-2px)}
  .ic .view{font-family:var(--mono);font-size:10.5px;color:var(--mut);margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
  .ic:hover .view{color:var(--ink)}
  .modal-bg{position:fixed;inset:0;background:rgba(20,19,16,.5);display:flex;align-items:flex-start;
    justify-content:center;padding:38px 16px;z-index:50;overflow:auto}
  .modal{background:var(--paper);border:1px solid var(--line2);border-radius:8px;max-width:840px;width:100%;

  .mstat{background:var(--card);padding:12px 14px}

  .mcov{font-family:var(--mono);font-size:11px;color:var(--mut);margin:6px 0 12px}
  .issuer-cta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--card);

// Language: a manual pick (localStorage) always wins. Otherwise auto-pick by region —
// Korea→ko, China→zh, everyone else→English (global default). Quick guess from browser
// locale/timezone for instant paint; server /api/geo (real IP via CDN) confirms right after.
const savedLang=localStorage.getItem('lang');
function quickGuessLang(){
  try{
    const ls=((navigator.languages&&navigator.languages.join(','))||navigator.language||'').toLowerCase();
    if(/(^|,)ko\b|ko-/.test(ls))return 'ko';
    if(/(^|,)zh\b|zh-/.test(ls))return 'zh';
    const tz=(Intl.DateTimeFormat().resolvedOptions().timeZone||'');
    if(tz==='Asia/Seoul'||tz==='Asia/Pyongyang')return 'ko';
    if(/Shanghai|Chongqing|Urumqi|Harbin|Taipei|Hong_Kong|Macau/.test(tz))return 'zh';
  }catch(e){}
  return 'en';
}
let lang=savedLang||quickGuessLang();
async function confirmGeoLang(){
  if(savedLang)return;                 // user already chose — never override
  try{
    const r=await fetch('/api/geo',{cache:'no-store'});
    const cc=((await r.json()).country||'').toUpperCase();
    if(!cc)return;                     // no edge country (e.g. local/non-CF host) — keep quick guess
    const want=cc==='KR'?'ko':(cc==='CN'?'zh':'en');
    if(want!==lang){lang=want;applyStatic();renderAll();}
  }catch(e){}
}

function marketStatus(){
  const now=new Date(), et=new Date(now.getTime()-4*3600*1000);
  const d=et.getUTCDay(), mins=et.getUTCHours()*60+et.getUTCMinutes();
  if(d===0||d===6) return {k:'mkt_weekend',open:false};
  if(mins>=570&&mins<960) return {k:'mkt_open',open:true};
  if(mins>=240&&mins<570) return {k:'mkt_pre',open:false};
  return {k:'mkt_closed',open:false};
}

function renderNewsList(){
  const box=document.getElementById('newsLive');if(!newsData.length)return;
  box.innerHTML=newsData.map(n=>{const cat=n.score>=15?'milestone':n.score>=10?'launch':'entrant';
    const title=(lang==='ko'&&n.title_ko)?n.title_ko:((lang==='zh'&&n.title_zh)?n.title_zh:n.title);
    const sum=((lang==='ko'&&n.summary_ko)?n.summary_ko:((lang==='zh'&&n.summary_zh)?n.summary_zh:(n.summary||''))).trim().replace(/"/g,'&quot;');
    return `<div class="ni-item">
      <div class="ni" onclick="toggleNews(this)">
        <span class="cat ${cat}">${n.cluster>1?'×'+n.cluster:'NEWS'}</span>
        <h4 style="flex:1">${title}</h4>
        <span class="meta">${n.source} · ${relTime(n.age_h)}</span>
        <span class="ni-caret">▾</span></div>
      <div class="ni-summary" style="display:none">
        <p>${sum||(lang==='ko'?'요약 없음 — 원문에서 확인':'No summary — see source')}</p>
        <a href="${n.link}" target="_blank">${lang==='ko'?'원문 기사 →':'Read source →'}</a></div>
    </div>`;}).join('');
}
async function loadNews(){
  const box=document.getElementById('newsLive');
  if(!newsData.length)box.innerHTML=`<div style="padding:18px;color:var(--mut);font-family:var(--mono);font-size:12px">${t('news_loading')}</div>`;
  try{const r=await fetch('/api/news',{cache:'no-store'});const j=await r.json();
    if(j&&j.items&&j.items.length){newsData=j.items;renderNewsList();}
  }catch(e){if(!newsData.length)box.innerHTML=NEWS[lang].map(n=>`<div class="ni"><span class="cat ${n.c}">${n.l}</span><h4>${n.t}</h4><span class="meta" style="margin-left:auto">${n.m}</span></div>`).join('');}
}
function showTab(name){
  document.querySelectorAll('[data-tab]').forEach(el=>{if(el.closest('#tabbar'))return;el.style.display=el.dataset.tab===name?'':'none';});
  document.querySelectorAll('#tabbar .tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===name));
  window.scrollTo(0,0);
  if(name==='main')renderTable();
  if(name==='news')loadNews();
  if(name==='cex'&&!spreadsData)loadSpreads(0);
}
function applyStatic(){
  document.querySelectorAll('[data-t]').forEach(el=>el.innerHTML=t(el.dataset.t));
  document.getElementById('search').placeholder=t('search_ph');
  document.getElementById('foot').innerHTML=t('foot');
  document.documentElement.lang=lang;
  [...document.querySelectorAll('#langSeg button')].forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
}

/* ===================== LIVE ===================== */
async function refreshPrices(){
  const ids=ASSETS.filter(a=>a.addr).map(a=>a.ck+':'+a.addr);
  try{const r=await fetch('https://coins.llama.fi/prices/current/'+ids.join(','),{cache:'no-store'});
    if(!r.ok)throw 0;const j=await r.json();let hit=0;
    ASSETS.forEach(a=>{const k=a.ck+':'+a.addr;if(j.coins&&j.coins[k]?.price){a.price=j.coins[k].price;a._live=true;hit++;}});
    if(hit){priceLive=true;}
  }catch(e){priceLive=false;}
  try{const r=await fetch('https://coins.llama.fi/percentage/'+ids.join(',')+'?period=24h',{cache:'no-store'});
    if(r.ok){const j=await r.json();ASSETS.forEach(a=>{const v=j.coins&&j.coins[a.ck+':'+a.addr];if(typeof v==='number')a.chg=v;});}}catch(e){}
}
async function refreshBirdeye(){
  const key=localStorage.getItem('birdeyeKey');if(!key)return;
  for(const a of ASSETS.filter(x=>x.ck==='solana')){
    try{const r=await fetch('https://public-api.birdeye.so/defi/token_overview?address='+a.addr,{headers:{'X-API-KEY':key,'x-chain':'solana'}});
      if(r.ok){const j=(await r.json()).data;if(j){if(j.v24hUSD)a.vol=j.v24hUSD;if(j.liquidity)a.liq=j.liquidity;if(j.price)a.price=j.price;if(j.v24hChangePercent!=null)a.chg=j.v24hChangePercent;}}
      await new Promise(s=>setTimeout(s,1100));}catch(e){}}
}
async function refreshLive(){
  try{const r=await fetch('/api/live',{cache:'no-store'});const j=await r.json();
    if(!j||!j.tokens||!j.generated)return; const T=j.tokens; liveVolTs=j.generated;
    if(FULL){
      const known=new Set();
      ['Backpack','xStocks'].forEach(k=>(FULL[k]||[]).forEach(a=>{known.add(a.t);const d=T[a.t];
        if(d){if(d.vol!=null)a.vol=d.vol;if(d.liq!=null)a.liq=d.liq;if(d.mc!=null)a.mc=d.mc;if(d.px!=null)a.px=d.px;}}));
      // auto-detect a freshly launched token (e.g. new Backpack listing) and add it live
      Object.keys(T).forEach(sym=>{const d=T[sym],iss=d.issuer;
        if(iss&&FULL[iss]&&!known.has(sym)&&((d.vol||0)>0||(d.liq||0)>0)){
          FULL[iss].push({t:sym,n:sym,vol:d.vol||0,liq:d.liq||0,mc:d.mc||null,px:d.px||null,chain:d.chain||'Solana'});
          if(ISSUER_AGG[iss])ISSUER_AGG[iss].count++;}});
    }
    ASSETS.forEach(a=>{const d=T[a.t];if(d){if(d.vol!=null)a.vol=d.vol;if(d.liq!=null)a.liq=d.liq;}});
  }catch(e){}
}
function renderAll(){
  applyStatic();
  recomputeAgg();
  const loc=lang==='ko'?'ko-KR':(lang==='zh'?'zh-CN':'en-US');
  document.getElementById('editionDate').textContent='LIVE · '+new Date().toLocaleString(loc,{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  renderHero();renderMovers();renderIssuerCTA();renderTop();renderShare();renderCross();renderTable();renderCmp();renderNews();
  chainMcapCh=chainDonut('chainMcap',CHAIN_MCAP,false,chainMcapCh);
  chainVolCh=chainDonut('chainVol',CHAIN_VOL,true,chainVolCh);
  renderChainLegend('chainMcapLeg',CHAIN_MCAP,false);renderChainLegend('chainVolLeg',CHAIN_VOL,true);
}
async function tick(){await refreshPrices();await refreshBirdeye();await refreshLive();await refreshTokenMcap();await refreshCEX();renderAll();}

  const url=location.href, title='OnchainEquities — Tokenized Stock & RWA Tracker';

  renderTable();});
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value;tablePage=0;renderTable();});
document.getElementById('searchClr').addEventListener('click',()=>{searchQ='';document.getElementById('search').value='';tablePage=0;renderTable();});

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
